name: Wave E2E

on:
  pull_request:
    branches:
      - "feature/phase-3-restructure/wave3"
      - "feature/phase-3-restructure/wave4"
  push:
    branches:
      - "feature/phase-3-restructure/wave3"
      - "feature/phase-3-restructure/wave4"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  e2e-wave3:
    if: contains(github.ref, 'wave3') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check E2E suite exists
        id: check
        run: |
          if [ -f tests/e2e/wave3-assets.spec.ts ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: E2E not yet implemented (NT-121)
        if: steps.check.outputs.exists != 'true'
        run: |
          echo "::warning::Wave 3 E2E suite not found — implement in NT-121 (see docs/phase3-restructure/WAVE3_E2E.md)"
          exit 0

      - name: Start demo stack
        if: steps.check.outputs.exists == 'true'
        run: |
          docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d --build
          timeout 180 bash -c 'until curl -sf http://localhost:8000/health; do sleep 5; done'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Playwright
        if: steps.check.outputs.exists == 'true'
        env:
          E2E_DEMO_PASSWORD_SUFFIX: "123"
        run: |
          npm ci
          npx playwright install --with-deps chromium
          E2E_BASE_URL=http://localhost:8080 npx playwright test tests/e2e/wave3-assets.spec.ts

      - name: Teardown
        if: always() && steps.check.outputs.exists == 'true'
        run: docker compose -f docker-compose.yml -f docker-compose.demo.yml down -v
