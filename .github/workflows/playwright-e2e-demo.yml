# Playwright E2E — demo stack (tests/e2e)
#
# Runs after a PR is merged into main (push to main).
# Also: manual dispatch for ad-hoc runs.
#
# Caching: npm (setup-node), Playwright browsers (~/.cache/ms-playwright).

name: Playwright E2E (demo stack)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-e2e-demo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-demo-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Check E2E scenarios exist
        id: check
        run: |
          count=$(find tests/e2e -name '*.spec.ts' | wc -l | tr -d ' ')
          echo "spec_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found $count Playwright spec(s) under tests/e2e/"
            find tests/e2e -name '*.spec.ts' | sort
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No E2E scenarios yet
        if: steps.check.outputs.exists != 'true'
        run: |
          echo "::warning::No *.spec.ts under tests/e2e/ — skipping E2E job"
          exit 0

      - name: Start demo stack
        if: steps.check.outputs.exists == 'true'
        run: |
          docker compose -f docker-compose-demo.yml up -d --build
          echo "Waiting for API health…"
          timeout 180 bash -c 'until curl -sf http://localhost:9001/health; do sleep 5; done'
          echo "Waiting for web…"
          timeout 60 bash -c 'until curl -sf -o /dev/null http://localhost:9081/; do sleep 3; done'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci

      - name: Get Playwright version
        if: steps.check.outputs.exists == 'true'
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.check.outputs.exists == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}-chromium

      - name: Install Playwright browsers
        if: steps.check.outputs.exists == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (browsers cached)
        if: steps.check.outputs.exists == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E scenarios (tests/e2e)
        id: e2e
        if: steps.check.outputs.exists == 'true'
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:9081
          E2E_DEMO_PASSWORD_SUFFIX: "123"
        run: |
          mkdir -p test-results
          set +e
          npx playwright test tests/e2e
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ ! -f test-results/e2e-results.json ]; then
            echo "{\"error\":\"Playwright JSON report missing\",\"exitCode\":$code}" > test-results/e2e-results.json
          fi
          exit $code

      - name: Write JSON failure summary
        if: always() && steps.check.outputs.exists == 'true' && steps.e2e.outcome == 'failure'
        run: node scripts/e2e-json-summary.mjs test-results/e2e-results.json

      - name: Upload Playwright artifacts
        if: always() && steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Teardown
        if: always() && steps.check.outputs.exists == 'true'
        run: docker compose -f docker-compose-demo.yml down -v
