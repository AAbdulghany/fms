# FMS demo — ONE free website on Render
# One URL: UI + API + Postgres. See DEMO_RENDER_ONE_URL.md

databases:
  - name: fms-demo-db
    plan: free
    databaseName: fms_demo
    user: fms

services:
  - type: web
    name: fms-demo
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/Dockerfile.demo
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fms-demo-db
          property: connectionString
      - key: APP_ENV
        value: demo
      - key: SEED_MODULE
        value: pitch
      - key: SECRET_KEY
        generateValue: true
