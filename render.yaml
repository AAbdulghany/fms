# Optional: deploy API + Postgres on Render (free tier).
# Frontend: Vercel or Netlify — see DEMO_VERCEL_NETLIFY.md
#
# Usage: Render Dashboard → New → Blueprint → connect repo → select this file.
# Or create Web Service manually from deploy/Dockerfile.api (root context).

databases:
  - name: fms-demo-db
    plan: free
    databaseName: fms_demo
    user: fms
services:
  # 1. FastAPI Backend API
  - type: web
    name: fms-demo-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: demo
      - key: SEED_MODULE
        value: pitch
      - key: DATABASE_URL
        fromDatabase:
          name: fms-demo-db
          property: connectionString

  # 2. React Frontend (Static Site)
  - type: static
    name: fms-demo-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Rewrites frontend /api calls directly to your Render API service
      - type: rewrite
        source: /api/*
        destination: https://fms-demo-api.onrender.com/api/*
      # Single Page Application (SPA) fallback routing
      - type: rewrite
        source: /*
        destination: /index.html