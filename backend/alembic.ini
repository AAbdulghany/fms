# Alembic configuration file for FMS
  [alembic]
  script_location = migrations
  sqlalchemy.url = postgresql+psycopg2://fms:fms@localhost:5432/fms

  # Logging configuration
  [loggers]
  keys = root, alembic

  [handlers]
  keys = console

  [formatters]
  keys = generic

  [logger_root]
  level = WARN
  handlers = console

  [logger_alembic]
  level = INFO
  handlers =
      console
  qualname = alembic

  [handler_console]
  class = StreamHandler
  args = (sys.stdout,)
  level = NOTSET
  formatter = generic

  [formatter_generic]
  format = %(levelname)s: %(message)s
  datefmt = %Y-%m-%d %H:%M:%S