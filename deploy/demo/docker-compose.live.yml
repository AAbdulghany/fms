# Demo live stack overlay
# Usage (on server, from repo root):
#   cp deploy/demo/.env.example deploy/demo/.env   # edit secrets + PUBLIC_APP_URL
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml -f deploy/demo/docker-compose.live.yml --env-file deploy/demo/.env up -d --build

services:
  db:
    ports: !reset []

  web:
    ports:
      - "${WEB_PORT:-80}:8080"

  api:
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in deploy/demo/.env}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?set PUBLIC_APP_URL}
      APP_ENV: demo

  migrate:
    environment:
      SECRET_KEY: ${SECRET_KEY}
