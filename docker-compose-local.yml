# Local development — full stack (db, migrate, api, web)
# Usage: docker compose -f docker-compose-local.yml up -d --build
# Or hybrid (host API + Vite): docker compose -f docker-compose-local.yml -f docker-compose-hybrid.yml up -d
#
# Project name MUST stay distinct from docker-compose-demo.yml (fms-demo)
# or containers overwrite each other under the same symlink path.

name: fms-local

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fms
      POSTGRES_PASSWORD: fms
      POSTGRES_DB: fms_local
    ports:
      - "9432:5432"
    volumes:
      - fms_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fms -d fms_local"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://fms:fms@db:5432/fms_local
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.docker_migrate
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://fms:fms@db:5432/fms_local
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      APP_ENV: ${APP_ENV:-development}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-notifications@fms.local}
    ports:
      - "9000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "9080:8080"
    depends_on:
      - api

volumes:
  fms_local_pgdata:
